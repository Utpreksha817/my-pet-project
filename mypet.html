<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBuddy - Your Coding Pet</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3e;
            --accent-primary: #00ff88;
            --accent-secondary: #ff6b9d;
            --accent-tertiary: #ffd93d;
            --text-primary: #e8e8f0;
            --text-secondary: #9090a8;
            --shadow-glow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 107, 157, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .pet-container {
            background: rgba(26, 26, 62, 0.6);
            border: 2px solid rgba(0, 255, 136, 0.2);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .pet-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        .pet-stage {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .stage-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .stage-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .pet-display {
            position: relative;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
        }

        .pet {
            width: 200px;
            height: 200px;
            position: relative;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(0, 255, 136, 0.4));
            transition: all 0.5s ease;
        }

        .pet.happy {
            animation: bounce 0.6s ease-in-out;
        }

        .pet-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--accent-primary), #00cc6f);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: inset 0 -20px 40px rgba(0, 0, 0, 0.2);
        }

        .pet-eyes {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
        }

        .eye {
            width: 24px;
            height: 28px;
            background: white;
            border-radius: 50% 50% 50% 50%;
            position: relative;
            animation: blink 4s infinite;
        }

        .pupil {
            width: 12px;
            height: 12px;
            background: #1a1a3e;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .pet-mouth {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 25px;
            border: 4px solid white;
            border-top: none;
            border-radius: 0 0 50px 50px;
        }

        .pet-ears {
            position: absolute;
            top: -10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }

        .ear {
            width: 40px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-primary), #00cc6f);
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
        }

        .ear.left {
            transform: rotate(-20deg);
        }

        .ear.right {
            transform: rotate(20deg);
        }

        .stats-panel {
            background: rgba(26, 26, 62, 0.6);
            border: 2px solid rgba(255, 107, 157, 0.2);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.2);
        }

        .stat-item {
            margin-bottom: 1.5rem;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat-value {
            color: var(--accent-tertiary);
        }

        .stat-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            transition: width 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s infinite;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .action-btn {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 204, 111, 0.2));
            border: 2px solid var(--accent-primary);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 16px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 255, 136, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.4);
            border-color: var(--accent-primary);
        }

        .action-btn span {
            position: relative;
            z-index: 1;
        }

        .log {
            grid-column: 1 / -1;
            background: rgba(26, 26, 62, 0.4);
            border: 2px solid rgba(255, 211, 61, 0.2);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            margin-top: 2rem;
            max-height: 200px;
            overflow-y: auto;
            animation: fadeInUp 0.8s ease-out 0.4s backwards;
        }

        .log-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent-tertiary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .log-entry {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            animation: slideInLeft 0.3s ease-out;
        }

        .log-entry .timestamp {
            color: var(--accent-tertiary);
            margin-right: 0.5rem;
        }

        .emoji {
            display: inline-block;
            font-size: 1.2em;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-30px) scale(1.1); }
            50% { transform: translateY(0) scale(0.95); }
            75% { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes blink {
            0%, 90%, 100% { height: 28px; }
            95% { height: 4px; }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CodeBuddy</h1>
            <p class="subtitle">Your pet grows with every line of code ✨</p>
        </header>

        <div class="main-content">
            <div class="pet-container">
                <div class="pet-stage">
                    <div class="stage-label">Current Stage</div>
                    <div class="stage-name" id="stageName">Egg</div>
                </div>

                <div class="pet-display">
                    <div class="pet" id="pet">
                        <div class="pet-ears">
                            <div class="ear left"></div>
                            <div class="ear right"></div>
                        </div>
                        <div class="pet-body">
                            <div class="pet-eyes">
                                <div class="eye">
                                    <div class="pupil"></div>
                                </div>
                                <div class="eye">
                                    <div class="pupil"></div>
                                </div>
                            </div>
                            <div class="pet-mouth"></div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button class="action-btn" onclick="simulateCommit()">
                        <span>📝 Make Commit</span>
                    </button>
                    <button class="action-btn" onclick="simulateTest()">
                        <span>✅ Write Tests</span>
                    </button>
                    <button class="action-btn" onclick="simulateLearn()">
                        <span>📚 Learn New Tech</span>
                    </button>
                    <button class="action-btn" onclick="simulateDocs()">
                        <span>📖 Write Docs</span>
                    </button>
                </div>
            </div>

            <div class="stats-panel">
                <h3 style="margin-bottom: 1.5rem; color: var(--accent-secondary);">Vital Stats</h3>
                
                <div class="stat-item">
                    <div class="stat-label">
                        <span>💚 Happiness</span>
                        <span class="stat-value" id="happinessValue">75%</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="happinessFill" style="width: 75%"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-label">
                        <span>⚡ Energy</span>
                        <span class="stat-value" id="energyValue">60%</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="energyFill" style="width: 60%"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-label">
                        <span>🧠 Knowledge</span>
                        <span class="stat-value" id="knowledgeValue">40%</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="knowledgeFill" style="width: 40%"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-label">
                        <span>⭐ Level</span>
                        <span class="stat-value" id="levelValue">1</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="levelFill" style="width: 0%"></div>
                    </div>
                </div>

                <div style="margin-top: 2rem; padding: 1rem; background: rgba(0, 255, 136, 0.1); border-radius: 12px; border: 1px solid rgba(0, 255, 136, 0.3);">
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Total XP</div>
                    <div style="font-size: 1.5rem; font-weight: 700; color: var(--accent-primary);" id="totalXP">0 / 100</div>
                </div>
            </div>
        </div>

        <div class="log">
            <div class="log-title">
                <span class="emoji">📜</span>
                Activity Log
            </div>
            <div id="logEntries">
                <div class="log-entry">
                    <span class="timestamp">[00:00]</span>
                    <span>Your CodeBuddy is born! Time to start coding! 🎉</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            happiness: 75,
            energy: 60,
            knowledge: 40,
            level: 1,
            xp: 0,
            xpNeeded: 100,
            stage: 'Egg',
            consecutiveDays: 0
        };

        const stages = [
            { name: 'Egg', minXP: 0, size: 1 },
            { name: 'Hatchling', minXP: 100, size: 1.2 },
            { name: 'Juvenile', minXP: 300, size: 1.5 },
            { name: 'Teen Coder', minXP: 600, size: 1.8 },
            { name: 'Code Master', minXP: 1000, size: 2.2 }
        ];

        function updateUI() {
            document.getElementById('happinessValue').textContent = `${state.happiness}%`;
            document.getElementById('happinessFill').style.width = `${state.happiness}%`;
            
            document.getElementById('energyValue').textContent = `${state.energy}%`;
            document.getElementById('energyFill').style.width = `${state.energy}%`;
            
            document.getElementById('knowledgeValue').textContent = `${state.knowledge}%`;
            document.getElementById('knowledgeFill').style.width = `${state.knowledge}%`;
            
            document.getElementById('levelValue').textContent = state.level;
            const levelProgress = (state.xp / state.xpNeeded) * 100;
            document.getElementById('levelFill').style.width = `${levelProgress}%`;
            
            document.getElementById('totalXP').textContent = `${state.xp} / ${state.xpNeeded}`;
            
            document.getElementById('stageName').textContent = state.stage;
            
            const pet = document.getElementById('pet');
            const currentStage = stages.find(s => s.name === state.stage);
            if (currentStage) {
                pet.style.transform = `scale(${currentStage.size})`;
            }
        }

        function addLog(message, emoji = '💬') {
            const logEntries = document.getElementById('logEntries');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="timestamp">[${time}]</span><span>${emoji} ${message}</span>`;
            logEntries.insertBefore(entry, logEntries.firstChild);
            
            if (logEntries.children.length > 10) {
                logEntries.removeChild(logEntries.lastChild);
            }
        }

        function gainXP(amount, activity) {
            state.xp += amount;
            
            if (state.xp >= state.xpNeeded) {
                levelUp();
            }
            
            checkEvolution();
            updateUI();
        }

        function levelUp() {
            state.level++;
            state.xp = state.xp - state.xpNeeded;
            state.xpNeeded = Math.floor(state.xpNeeded * 1.5);
            
            const pet = document.getElementById('pet');
            pet.classList.add('happy');
            setTimeout(() => pet.classList.remove('happy'), 600);
            
            addLog(`Level up! Your pet is now level ${state.level}! 🎉`, '⭐');
        }

        function checkEvolution() {
            const totalXP = (state.level - 1) * 100 + state.xp;
            
            for (let i = stages.length - 1; i >= 0; i--) {
                if (totalXP >= stages[i].minXP && state.stage !== stages[i].name) {
                    state.stage = stages[i].name;
                    addLog(`Evolution! Your pet evolved into ${state.stage}! 🌟`, '✨');
                    
                    const pet = document.getElementById('pet');
                    pet.classList.add('happy');
                    setTimeout(() => pet.classList.remove('happy'), 600);
                    break;
                }
            }
        }

        function simulateCommit() {
            const xpGain = Math.floor(Math.random() * 10) + 10;
            state.happiness = Math.min(100, state.happiness + 5);
            state.energy = Math.max(0, state.energy - 3);
            
            gainXP(xpGain, 'commit');
            addLog(`Made a commit! +${xpGain} XP. Your pet is proud! 🎯`, '📝');
            
            const pet = document.getElementById('pet');
            pet.classList.add('happy');
            setTimeout(() => pet.classList.remove('happy'), 600);
        }

        function simulateTest() {
            const xpGain = Math.floor(Math.random() * 15) + 15;
            state.happiness = Math.min(100, state.happiness + 8);
            state.energy = Math.max(0, state.energy - 5);
            
            gainXP(xpGain, 'test');
            addLog(`Wrote tests! +${xpGain} XP. Quality code makes pet happy! 💚`, '✅');
            
            const pet = document.getElementById('pet');
            pet.classList.add('happy');
            setTimeout(() => pet.classList.remove('happy'), 600);
        }

        function simulateLearn() {
            const xpGain = Math.floor(Math.random() * 20) + 20;
            state.knowledge = Math.min(100, state.knowledge + 10);
            state.happiness = Math.min(100, state.happiness + 10);
            state.energy = Math.max(0, state.energy - 8);
            
            gainXP(xpGain, 'learn');
            addLog(`Learned something new! +${xpGain} XP. Knowledge is power! 🚀`, '📚');
            
            const pet = document.getElementById('pet');
            pet.classList.add('happy');
            setTimeout(() => pet.classList.remove('happy'), 600);
        }

        function simulateDocs() {
            const xpGain = Math.floor(Math.random() * 12) + 12;
            state.happiness = Math.min(100, state.happiness + 7);
            state.energy = Math.max(0, state.energy - 4);
            
            gainXP(xpGain, 'docs');
            addLog(`Wrote documentation! +${xpGain} XP. Future you says thanks! 📖`, '📖');
            
            const pet = document.getElementById('pet');
            pet.classList.add('happy');
            setTimeout(() => pet.classList.remove('happy'), 600);
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
